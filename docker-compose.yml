services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: claims-admin-dashboard
    restart: unless-stopped
    ports:
      - "3050:3050"
    environment:
      # Public variables (already baked into build)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}

      # CRITICAL: App URL for auth redirects (magic links, password resets)
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}

      # Server-side only variables
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # Node environment
      - NODE_ENV=production
      - PORT=3050
      - HOSTNAME=0.0.0.0
    env_file:
      - .env
    networks:
      - claims-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3050/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    labels:
      - "com.claims-admin.description=Supabase Claims Admin Dashboard"
      - "com.claims-admin.version=1.0.0"

networks:
  claims-network:
    driver: bridge
