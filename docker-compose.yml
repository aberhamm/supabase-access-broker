services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: https://access.matthew.systems
    container_name: supabase-access-broker
    restart: unless-stopped
    ports:
      - "3050:3050"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3050
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3050/api/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
