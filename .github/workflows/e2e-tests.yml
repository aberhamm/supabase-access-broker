name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 30
    runs-on: self-hosted
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Clean stale pnpm self-installer dir
        run: rm -rf ~/setup-pnpm

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright system deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 fonts-unifont fonts-ubuntu

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Use 3051 so E2E doesn't collide with the prod container on :3050
          E2E_PORT: '3051'
          NEXT_PUBLIC_APP_URL: http://localhost:3051
          # Disable the in-memory apps cache so edits are visible immediately
          # after a reload (the detail page is force-dynamic but reads a 5-min
          # module cache that doesn't reliably clear under `next start`).
          APP_CACHE_TTL: '0'
          NEXT_PUBLIC_AUTH_PASSWORD: true
          # Enable OAuth providers globally so per-app auth_methods toggles take effect
          # in the self-signup E2E tests. Actual OAuth config lives in Supabase.
          NEXT_PUBLIC_AUTH_GOOGLE: true
          NEXT_PUBLIC_AUTH_APPLE: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
